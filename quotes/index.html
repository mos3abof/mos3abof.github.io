in class="max-w-6xl mx-auto my-4"><section class="flex flex-col gap-8 justify-center items-center p-6 sm:flex-row"><article class="px-4 w-screen sm:px-0"><h1 class="text-4xl font-bold sm:text-5xl text-slate-900 dark:text-slate-300">Quotes that resonate with me<span class="p-0 m-0 text-7xl text-teal-600 leading-[0px]">.</span></h1><div class=my-4><h3 id=some-of-the-quotes-that-resonate-with-me-the-most>Some of the quotes that resonate with me the most</h3><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-3xl">The individual has always had to struggle to keep from being overwhelmed by the tribe. If you try it, you will be lonely often, and sometimes frightened. But no price is too high to pay for the privilege of owning yourself.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Friedrich Nietzsche</figcaption></blockquote></figure><div class="flex items-center justify-center my-16 select-none" aria-hidden=true role=separator><span class="text-xl tracking-[0.5em]">٭ ٭ ٭</span></div><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-3xl">A man who has become conscious of the absurd is forever bound to it.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Albert Camus, The Myth of Sisyphus</figcaption></blockquote></figure><div class="flex items-center justify-center my-16 select-none" aria-hidden=true role=separator><span class="text-xl tracking-[0.5em]">٭ ٭ ٭</span></div><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-3xl">Your need for acceptance can make you invisible in this world. Don't let anything stand in the way of the light that shines through this form. Risk being seen in all of your glory.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Jim Carrey</figcaption></blockquote></figure><div class="flex items-center justify-center my-16 select-none" aria-hidden=true role=separator><span class="text-xl tracking-[0.5em]">٭ ٭ ٭</span></div><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-3xl">The chief beauty about time is that you cannot waste it in advance. The next year, the next day, the next hour are lying ready for you, as perfect, as unspoiled, as if you had never wasted or misapplied a single moment in all your life. You can turn over a new leaf every hour if you choose.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Arnold Bennett</figcaption></blockquote></figure><div class="flex items-center justify-center my-16 select-none" aria-hidden=true role=separator><span class="text-xl tracking-[0.5em]">٭ ٭ ٭</span></div><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-3xl">Your experience of being alive consists of nothing other than the sum of everything to which you pay attention. At the end of your life, looking back, whatever compelled your attention from moment to moment is simply what your life will have been. So when you pay attention to something you don't especially value, it's not an exaggeration to say you're paying with your life.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Oliver Burkeman, Four Thousand Weeks: Time Management for Mortals</figcaption></blockquote></figure></div></article></section></main><footer class="mx-auto max-w-6xl"><section class="flex flex-col gap-8 justify-center items-center mt-6 sm:flex-row"><div class="flex px-0 mx-0"><a class=px-1 href=https://twitter.com/mos3abof> <i class="my-auto hover:text-blue-400 text-slate-600 mdi mdi-twitter mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.github.com/mos3abof> <i class="my-auto hover:text-black text-slate-600 mdi mdi-github mdi-24px dark:text-slate-300 dark:hover:text-slate-500"></i> </a><a class=px-1 href=https://www.linkedin.com/in/mosab> <i class="my-auto hover:text-blue-500 text-slate-600 mdi mdi-linkedin mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.facebook.com/mos3abof> <i class="my-auto hover:text-blue-700 text-slate-600 mdi mdi-facebook mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.instagram.com/mos3abof> <i class="my-auto hover:text-pink-500 text-slate-600 mdi mdi-instagram mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.youtube.com/@mos3abof13> <i class="my-auto hover:text-red-500
