[[comments]]
author = "Anonymous"
date = "2007-04-06T00:45:00+00:00"
text = "\" أفتح موقع google.co.ma و أكتب على محرك بحثه كلمات أحبها:\" عشرينات، 20at، مصعب php، مروة بلوغرز، براء و دعاء، معتصم تصميم،...إلخ\".كل يوم هذه هي حكايتي مع فريق عشرينات. ألخصها في خواطر ليست كالخواطــر.... <br /><br />خواطر شـاب... <br /><br />كل سنة وانتم طيبيين يا عشرينات…..<br />كل سنة وأنت طيب يا فندم عشرينات…….<br />في الحقيقة...الإنسان يفرح على مثل هاد النجاح.....<br />في جو كل مرح ....ممتزج بروح المحبة و نسمات الصحبة....<br />آآآه....اللــــــــــــــــه.....الحمد لله يا رب موجودين ناس مثلكم.....<br />و موجودين.... و موجودين.... و موجودين....<br />\"لو علم الناس المحبة التي نعيشها بيننا لقاتلونا عليها بالسيوف\" قولة شهيرة لإبن القيم، تنطبق عليكم يا عشرينات.......<br />اللهم لك الحمد يا فندم عشرينات....و زد في الحمد يا فندم.....و حافظ على هذه الخلة المؤمنة بربها ، الواثقة في مستقبلها، المتفانية في عملها، المحبة لإخوتها...... المحبة..مممم....آآآه...على المحبة....المحبة محلها القلب، و القلب ليه جنود، ترعاه...و تقويه...و تغذيه...و تجعل كل الناس تحبوا...جنود ليست كالجنود...قوتها تخرق السدود....يا مصعب، معاني عظيمة تحس بيها و أحس بيها ، و يحس بيها فريق عشرينات كلهم، إنت و أنا عارف أن \"المعاشرة حجاب\" ....العشرة و الخلة تحت سقف مكتب عشرينات فيها مشاكل و فيها متاعب....و فيها روتين...و..و..لكن داخل المتاعب دي و انتم تأكلون \"سندويتشات\" بعد عياء مضني..أيوة مضني.. ...يـــ ااااـــــاه..بتحسوا في اللحظات دي بمعاني في قلوبكم لا توصف، معاني فيها سبحات صوفية، روحية، يقذفها الكريم سبحانه في قلوب الشباب دوول...\"صادقين و النية حسنة\".....و الله صدق حبيبنا \"عبد الله الطحاوي\" في مقاله الأخير الحلو لي كل معاني عميقة : \" حياتهم ضحك ولعب وقليل من الجد.. يفكرون وهم يأكلون.. يضحكون وهم يعملون.. ويعملون وهم يتحركون.. الفكرة حدوتة .. والعنوان قفشة.. والموضوع إفيه.. حياتهم سطورهم.. انطباعاتهم منقوشة على الوورد.. قليل من العمر كثير من الأمل، معظمهم متخففون.. لا يملكون شيئا.. ومن ثم لا يخشون شيئا.. طوبى للبساطة..\"<br />\"المحبة كنز لا يفنى\" \"المحبة أوقظت الغافلين\" \" المحبة أوصلت الواصلين\" المحبة هيجت أرواح المخبتين المحبين\"\"المحبة عون و زاد للمجاهدين\" \"المحبة سر من أسرار المحبوبين\"\"المحبة ألهبت القاعدين\" \" المحبة،أيها الأحبة....جعلت الأعداء أحبة.والصحبة مودة\"...<br />دا مربط الفرس أيوة....بل هو الفرس اللي كنتوا راكبين عليه طوال ثلات سنوات دوول....صفاء و محبة و ود،... صفاء الروح ، و محبة القلب، و ود العشرة،....الفرس ده، كان جامد قوي أمام الأحداث الصعبة، و الصدمات اللي مش كويسة، لكن ...مين كان يقوي الفرس ده و يغذيه؟ إنتم...بحبكم لبعضيكم، بلطفكم على بعضيكم،ببتسامة بعضكم في وش بعضكم، بزيارة مريضكم، و تفقد غائبكم....<br />**يوم ما مرض مصعب، صرختوا كلكم :\"إنتا فين يا مصعب ،إنت ليه غيبتي عنا،\" قاليكم هو : \"أنا في المستشفى يا أحبة....\". قمتوا زرتوه و واسيتوه و صورتوه،...قام حبيبنا رفعت عمل فيديو هايل لمصعب يؤرخ لمرحلة المرض و الصراع من أجل البقاء مع شبح إسموا الزايدة،--على فكرة أنا بحيي و أسلم على حبيبي و صديقي رفعت--.<br />**و يوم ما خطب براء دعاء، و كان عايز يحول عفشوا الجديد لي شقتوا الجديدة، كنتوا أنتم الأولين من ساعدوا ، و قف بيجنبوا، ،--على فكرة أنا بحيي و أسلم على حبيبي و صديقي براء--.<br />كنوا بتأرخوا لتجربة فريدة لجيل فريد، شعاروا الوحيد:\"أنا عشريناتي\"، لكن في الحقيقة في الجانب الآخر شعاروا الحقيقي:\"أنا شاب باحب الخير لكل الشباب الحلوين، و عايز ليهم الخير، و عايز المحبة و الخير و العدل ينتشر في بلدي، صادق و نيتي حسنة...\" دا كان هو الشعار الحقيقي المخفي الخفي الظاهر في كتاباتكم ، في حواراتكم ، في صوركم، في صحبتكم لبعضيكم.... <br />بيقول أحد من فضلاء القوم :\"إذا كنت حزينا فابـك بقوة\"، و إحنا حنقول اليوم و احنا بنحتفل بالسنة الثالثة للعشرينات،و كلنا فرح و غبطة و نصر ، حنقول جميعا ....جميعا...: \"إذا كنت فرحا فابـك بقوة\"، .....أصل الدموع فيها و فيها ...مش بيقولوا :\" دموع الفرح يا نـــــينا...\"<br />كل سنة وانتم طيبين يا عشرينات <br />كل سنة وانت طيب يا فندم عشرينات <br />يارب،إن شاء الله، نشفكم على طول<br />محتفلين بنجاحكم الخالد... <br />إن شاء الله، يارب.<br />أخوكم...إنتوا عارفينوا....<br />من المغرب"
