[[comments]]
author = "MarwaAshraf"
date = "2008-01-13T21:11:00+00:00"
text = "إسمح لي بعد إذنك بشوية رغي كده على الماشي علشان مش حينفع مرغيش في موقف زي ده <br /><br />عمرك شوفت حد في الدنيا على وشة تعبير إنه مخضوض وفي نفس الوقت فطسان على نفسه من الضحك.. انا دخلت في الحالة دي لما قرأت البوست.. المفروض إني مخضوض علشان في حادثة وأكشن وكوتشي مخلوع بقى وحركات وفي نفس الوقت فطسانة على روحي من الضحك علشان مشهد الفيلم اللي شوفته كتير في الإعلانات وعمري ما زهقت منه وبحبه جدا كمان  لأنه بيفكرني بنفسي ، أنا صحيح مش عندي عربية إلا إن مافيش يوم بيعدي من غير ما أصتدم بحد ومش أي خبطة الصراحة بتكون في الصميم ودايما أنا اللي مش مركزة وبكون السبب في الخبطة وساعتها بيبقى نفسي اللي خبطة يسألني \"والساندوتش كويس؟\".. وعلى فكرة بتكون معجزة لو روحت بيتنا يوم من غير ما أخبط حد.. مش عارفة لما يكون عندي عربية حيحصل ايه .. هههههههه<br /><br />واللي ضحكني جدا بردوا موضوع الكوتش ده، ولا الراجل بتاع \"البتر\" .. هي كلمة توجع الصراحة بس موتتني على نفسي من الضحك ... لا بجد يا مصعب أبدعت .. محدش قبل كده إقدر يخليني مخضوضة وفي نفس الوقت فطسانة على روحي من الضحك <br /><br />شوفت بعد الرغي ده كله نسيت أقولك أهم حاجة \"سلامتك وربنا يشفيك\" يلا بسرعة قول أمين <br /><br />سلامات <br /><br />:)"
