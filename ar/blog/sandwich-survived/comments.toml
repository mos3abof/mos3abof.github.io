[[comments]]
author = "MariumaZ"
date = "2008-01-20T16:07:00+00:00"
text = "وأنا أقول انت ليه لابس سليبر مفتوح من كل ناحية في عز التلج اللي إحنا فيه ده واتكسفت أسألك.. أتاريك خبطتك بنت في الشارع وفرمت رجلك ... سلامتك ألف سلامة يا مصعب ... وعلى العموم الموقف ده فيه ثلاث نقاط مهمة ... أولاً إن اللي خبطتك بنت وأحمد ربنا لأنه لو كان ولد مش بعيد كان بعد ما خبطك .. يطلع يضربك ويشتمك ويقولك ما تفتح يا حيوان .. ودي حتكون أقل شتيمة .. وده لأن الولاد ما بيحبوش يعترفوا إنهم غلطوا وبلطجية سواقة ومابيخافوش..<br />ثانياً ... لازم يظهر العسكري المترصد لكل شخص خسيس معاه حبة فلوس خلوه يسوق عربيةولازم يكون ضد الشخص السواق على أساس إنه أغنى!!!<br />وساعات يبقى حيموت ياخد قرشين من العملية دي علشان يفوت الأمور بمزاجه ومايعملش محضر، وخصوصاً لو كانت بنت أو واحدة ست اللي سايقين!!!<br />ثالثاً... الشعب المصري اللي بيفرح في اللمة والزحمة والمصيبة واللي بيفتح قسم إفتاء فوري بيتضمن معلومات طبية وقانونية وإجتماعية ودينية ... وبرضوا بيهبوا في السواق على أساس إنه بيمثل لهم رمز مصغر للسلطة والمال والطغيان ... ولا أنت إيه رأيك؟؟؟"
