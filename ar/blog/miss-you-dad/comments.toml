text = "أخي الحبيب / مصعب <br /><br />كادت عيني ان تذرف الدمع <br />فما ترويه اثار الشحون لدي والدي الحبيب رحمة الله عليه <br />خرجت كالعادة الى العمل صباحا وقبل أن أهم بالخروج سلمت عليه وكان راقدا مريضا فقبلته ودعا لي وخرجت <br />وبعد يوم شاق عدت الى المنزل لأجد أخ كريم ومعه طبيب يغادر بيتنا لم اصدق فجريت مسرعا فتلقفني اخي مهدئا روعي ومذكرا اياي بالله عز وجل .. اردت فقط ان القي نظرة عليه .. ولأنني لا احب ان يرى عبراتي أحد فخرجت وتماسكت امام امي واخوتي ..وذهبنا لنصلي عليه فدخلنا المسجد الذي اعتاد ان يسمع صوته بالنداء للصلاة ووقفت لأول مرة أصلي اماما في حضرته بل ولاصلي عليه لم اتمالك نفسي من البكاء وانا ادعوا له بالمغفرة وقتها كرهت الدنيا بكل زينتها هذه الدنيا التي فرقت بين الاحباء ....<br />بعد هذه السنوات أعلن أن الوقت لم يستطع أن يخفف من شعوري بفقدانه <br />واذكر نفسي واياك بأن لوالدينا حق علينا <br />أن ندعو لهم <br />وأن نزور اصدقائهم <br />وأن نكمل عمل خير كان يفعلونه<br /><br />ونسال الله أن يرحم الجميع <br /><br />اخوك <br /><br />مجاهد شرارة"
