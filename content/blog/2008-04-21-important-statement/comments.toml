text = "سيد مصعب .. ان شعب حلوان المناضل يشكرك من صميم قلبه علي دعمك الواضح في الوقت الذي تخلت فيه دول كبرى عن إعلان تأيدها لاستقلال حلوان.. <br /><br />وانا اتفق مع الاستاذ احمد عبد الفتاح في تصحيح المعلومة المغلوطة حول الهتافات ، فقد اجمعت الجماهير المطحونة في ميدان المحطة علي هتاف الله حلوان أبو رجيلة، وبمناسبة اعياد الربيع تنوي بعض الجماهير تغيير الهتاف الى الله الوطن الحديقة اليابانية <br /><br />وقبل أن أنهى كلامي اوجه رسالة أشكر فيها من قدموا أرواحهم علي مدار التاريخ حتى تحصل حلوان علي استقلالها التام.. وشكرا<br /><br />تصفيق حااااااااااد"

