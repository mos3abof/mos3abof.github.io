text = "و أنا بدوري أهنئ شعوب المنطقة و أهيب بكل الذين شاركوا في الاستقلال <br />و أنصح الزعماء في المنطقة بالتعاون المشترك مع زعماء المناطق المجاورة و العمل على انشاء سوق مشتركة و فتح الحدود لسكان المناطق المجاورة مع العمل على تأمين الدولة من الدخلاء و الحاقدين و أصحاب المصالح الشخصية و الناقمين على الاستقلال (و اللى متغاظين ان مناطقهم ما استقلتش )<br />و من موقعي هذا أعلن أننا نحن سكان مدينة العبور سوف نحارب العدو حتى ننتصر و نستقل بمدينتنا و سوف نبذل من أجل ذلك كل ثمين و نفيس واضعين أمام أعيننا التجربة الحلوانية كمثال حي <br />و اشكركم <br />مديحة حاتم<br />مدينة العبور<br />القاهرة"

