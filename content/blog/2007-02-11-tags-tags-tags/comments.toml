text = "محمد السيد باشا.. منورنا جدا<br />بس مين قال لك إن الست حاجات دول فيك؟!! أنا مش قصدي عليك خالص والله<br />وعاوز تضربني ليه بس كفى الله الشر؟!!<br /><br /><br />علاء باشا بيه، أنا مش عارف أقول لك ايه بس كلامك وسام على صدري<br /><br /><br />أميرة هشام.. لي شرف إنك تعرفي ده مني ومنورانا والله<br /><br /><br />ماشي يا بيوكيميائية.. قصدي يا علا.. لما أشوفك أونلاين بس :)<br /><br /><br />أحمد عبدالله صاحب العالم المجنون .. مش عارف أقول لك ايه، بس بكرة لما آجي المكتب هأمسح معاك الكيبورد وأنضفه<br /><br /><br />فاطمة .. احنا اتكلمنا أونلاين، بس ده لا يمنع أشكرك تاني<br /><br /><br />صوت عصفورة.. مش هنقول عليكي غلسة.. بس كنتي علقي على الموضوع يعني :)<br /><br /><br />وئام ربنا يخليكي ومعلش ما أخدتش بالي، وآديني ضفت التاج بتاعك"

