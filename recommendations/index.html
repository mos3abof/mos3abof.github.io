class="flex flex-col gap-8 justify-center items-center p-6 sm:flex-row"><article class="px-4 w-screen sm:px-0"><h1 class="text-4xl font-bold sm:text-5xl text-slate-900 dark:text-slate-300">Recommendations<span class="p-0 m-0 text-7xl text-teal-600 leading-[0px]">.</span></h1><div class=my-4><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab is deft and friendly geek whom I've known for over a decade before finally working together in the same team.<br>Mosab possesses an impressive in-depth knowledge powered by relentless desire to dissect and understand the core of every technology he touches. This prowess allows him to easily digest new technologies and paradigms, ask the right questions, and to excel at managing systems on a large scale. Combining that knowledge with agility gives him the gift of quickly changing lanes with no discourse. Mosab has done that while maintaining a very positive attitude during the toughest times.<br>It was a true pleasure working with Mosab on daily basis. I would seize the opportunity to work with him again.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Omar Ali - VP Engineering at Jodel</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab is one of the best engineers I've ever worked with. He is extremely passionate and dedicated, has a vast knowledge about anything which is related to technology, and he's always eager to learn more.<br>He is also a trusted friend who helped me in several occasions.<br>I would recommend Mosab anytime, he is a great professional who would bring great value to any company.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Alessandro Balasco - Lead Software Engineer in Residence at Oetker Digital GmbH</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">I have been with Mosab on a novel project over the course of 9 months where he made a crucial contribution to ensure a scaling, reliable and fault-tolerant system that was able to handle up to a billion transactions a day. His in-depth technical knowledge helped to overcome a number of complex scenarios when dealing with high load traffic in a distributed micro service system.<br>On a personal note, Mosab was always a delightful conversationalist brining insightful topics which lead to highly stimulating exchanges outside of work settings.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Evgeny Sinikov - Head of Solution Integration at Zurich Insurance Company Ltd</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab is one of the most creative developers I have ever worked with. An open source believer who is always open for new ideas, I love how simple he can get things done.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Ibrahim Abdelfattah - Tech Lead / Engineering Manager at Dubizzle</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab is not only an insightful and broad-minded software engineer, but also an inspiring team player, his knowledge is vast and thorough. He is probably one of the best software engineers I've ever met in my life and one of the smartest colleagues I've ever worked with.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Omar Badr - IT Director / Independent ICT Consultant</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab is one of the best web developers I have worked with. He has a passion for innovation and adopting new technologies especially open source technologies. He also has very good sense of ownership towards the place he works in and knows how to lead a team of developers and motivate them towards the goal of his company. In short, Mosab is both a good developer and a good team leader to hire.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Ahmed Ezzeldin - Lead Software Engineer at EPAM Systems</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab, is one of the most talented delevlopers I've ever worked with, he is devoted to his work. He is keen to deliver his work perfectly. Really you can depend on him..</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Ali Mansour - TC Producer at Aljazeera Media Network</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab is an very well educated, very well organized, fast-learning and extremely thorough developer with special skills and interests in PHP coding, I have worked with him and I can say he was surprising me all the time by his talented mind and the way he likes his work!</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Hesham Zebida - Founder of FamouseBloggers.net</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Moseb is a great person to work with. He is an excellent player in team work group. We worked together in big project and he showed great dedication to the work even though it was a part time project besides his full time work. I would recommend Moseb without thinking twice.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Ahmed Saber - Senior Software Engineer at DinoplusAPI</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">He is an intellectual GEEK who can inspire people by his different way of thinking.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Ahmed Abdullah - CTO WeCanCam</figcaption></blockquote></figure><figure class=my-8 dir=ltr><blockquote class="relative py-6 px-8 not-italic rounded-lg border-teal-600 border-s-4 bg-slate-100 dark:bg-slate-900"><span class="absolute top-2 left-3 text-teal-600/20 text-8xl font-serif leading-none select-none" aria-hidden=true>" </span><div class="not-italic leading-loose text-slate-700 dark:text-slate-200 font-medium space-y-4 text-xl">Mosab is a very motivated software engineer who is majorly interested in Open Source software and technology. His constant output has proven his passion for writing code. Mosab can always provide help to colleagues, work under stress and provides necessary communication skills.</div><figcaption class="px-8 mt-2 text-xl italic text-slate-500 dark:text-slate-400" dir=ltr><br> — Mohammed El Hakim - DevOps Engineer at dunnhumby</figcaption></blockquote></figure></div></article></section></main><footer class="mx-auto max-w-6xl"><section class="flex flex-col gap-8 justify-center items-center mt-6 sm:flex-row"><div class="flex px-0 mx-0"><a class=px-1 href=https://twitter.com/mos3abof> <i class="my-auto hover:text-blue-400 text-slate-600 mdi mdi-twitter mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.github.com/mos3abof> <i class="my-auto hover:text-black text-slate-600 mdi mdi-github mdi-24px dark:text-slate-300 dark:hover:text-slate-500"></i> </a><a class=px-1 href=https://www.linkedin.com/in/mosab> <i class="my-auto hover:text-blue-500 text-slate-600 mdi mdi-linkedin mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.facebook.com/mos3abof> <i class="my-auto hover:text-blue-700 text-slate-600 mdi mdi-facebook mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.instagram.com/mos3abof> <i class="my-auto hover:text-pink-500 text-slate-600 mdi mdi-instagram mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://www.youtube.com/@mos3abof13> <i class="my-auto hover:text-red-500 text-slate-600 mdi mdi-youtube mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=https://fosstodon.org/@mos3abof rel=me> <i class="my-auto hover:text-violet-600 text-slate-600 mdi mdi-mastodon mdi-24px dark:text-slate-300"></i> </a><a class=px-1 href=/rss> <i class="my-auto hover:text-orange-400 text-slate-600 mdi mdi-rss mdi-24px dark:text-slate-300"></i> </a></div></section><section class="flex flex-col gap-8 justify-center items-center mt-5 mb-4 sm:flex-row"><div class="px-0 mx-0"><p class="max-w-md text-center text-sl text-slate-600 sm:text-sl dark:text-slate-300"><p><p class="max-w-md text-center text-sl text-slate-600 sm:text-sl dark:text-slate-300">(c) 2026 - Mosab Ibrahim<p></div></section><section class="flex flex-col-reverse justify-center items-center mt-10 mb-12 sm:flex-row"><a href=http://www.catb.org/hacker-emblem/><img alt="Hacker
