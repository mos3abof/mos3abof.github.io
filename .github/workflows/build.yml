name: Build and deploy my website

env:
  ZOLA_VERSION: "0.19.2"
  SOURCE_BRANCH: "main"
  TARGET_BRANCH: "gh-pages"
  BUILD_MODE: "github"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [new-comment]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install zola
        run: |
          set -x
          wget -O - \
             "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
          | sudo tar xzf - -C /usr/local/bin
      - name: Checkout the reposirtory code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Export comments from Neon
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          pip install psycopg2-binary tomli-w --quiet
          python comments/export_comments.py
      - name: Build the world
        run: make build
      - name: Deploy Cloudflare Worker
        if: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', env.SOURCE_BRANCH) }}
        working-directory: comments/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
      - name: Publish website to github pages
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.event_name == 'workflow_call' || github.event_name == 'repository_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', env.SOURCE_BRANCH)) }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
