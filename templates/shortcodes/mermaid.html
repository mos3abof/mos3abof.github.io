{#
mermaid renders a Mermaid diagram, dark-mode aware.

Usage (body shortcode):
{% mermaid() %}
flowchart TD
A --> B
{% end %}
#}
<pre class="mermaid" style="all:unset;display:block">{{ body }}</pre>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: true,
    theme: document.documentElement.classList.contains('dark') ? 'dark' : 'neutral',
  });
</script>
